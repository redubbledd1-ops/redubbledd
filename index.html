<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedubbledD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Quill.js CDN -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <!-- GrapesJS CDN -->
    <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
    <script src="https://unpkg.com/grapesjs"></script>
</head>
<body class="is-booting">
    <!-- tsParticles Canvas -->
    <div id="tsparticles"></div>
    
    <!-- Main Content Container -->
    <div class="container">
        <!-- Center Content -->
        <div class="center-content">
            <h1 class="main-title">RedubbledD.com</h1>
            <div class="site-notice">
                <span class="site-notice-line">This site is not finished, come back later.</span>
                <span class="site-notice-line">Made by Frank Vermeulen.</span>
            </div>
        </div>

        <main class="page-container">
            <section class="page" data-page="home"></section>
            <section class="page" data-page="projects" hidden></section>
            <section class="page" data-page="websites" hidden></section>
            <section class="page" data-page="home-assistant" hidden></section>
            <section class="page" data-page="info" hidden></section>
            <section class="page" data-page="editor" hidden>

                <div id="editor-loading" style="padding:20px;color:#fff;text-align:center;">
                    Loading editor...
                </div>

                <select id="page-select">
                    <option value="home">Home</option>
                    <option value="projects">Projects</option>
                    <option value="websites">Websites</option>
                    <option value="home-assistant">Home Assistant</option>
                    <option value="info">Info</option>
                    <option value="projects-frankybird">FrankyBird</option>
                    <option value="projects-shooter">Shooter</option>
                    <option value="websites-dedenkarbeider">Dedenkarbeider</option>
                    <option value="websites-klispoel">Klispoel</option>
                </select>

                <div id="gjs" style="height:500px;"></div>

                <button id="save-content">Save Content</button>

            </section>
        </main>
    </div>

    <div id="submenu" style="display:none;"></div>

    <nav class="side-menu">
        <ul class="menu-list">
            <li><a href="#home" class="menu-item" data-page="home" data-title="RedubbledD.com">Home</a></li>
            <li><a href="#projects" class="menu-item" data-page="projects" data-title="Projects">Projects</a></li>
            <li><a href="#websites" class="menu-item" data-page="websites" data-title="Websites">Websites</a></li>
            <li><a href="#home-assistant" class="menu-item" data-page="home-assistant" data-title="Home Assistant">Home Assistant</a></li>
            <li><a href="#info" class="menu-item" data-page="info" data-title="Info">Info</a></li>
            <li><a href="#editor" class="menu-item" data-page="editor" data-title="Editor">Editor</a></li>
        </ul>
    </nav>
    
    <!-- Hidden Command Console -->
    <div id="cmd-console">
        <div id="cmd-output"></div>
        <div id="cmd-inputline">
            <span id="cmd-prompt">&gt;</span>
            <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a command..." />
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle"></script>
    <script src="script.js"></script>
</body>
</html>
